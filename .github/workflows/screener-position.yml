name: Weekly Position Screener

on:
  schedule:
    - cron: '0 14 * * 1'  # Lunes 14:00 UTC = 10:00 AM ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Run position screener
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python scripts/run_screener_position.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screener_position.json data/screener_position_history.json
          git diff --staged --quiet || git commit -m "chore: position screener update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
