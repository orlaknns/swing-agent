name: Daily Screener

on:
  schedule:
    - cron: '30 14 * * 1-5'  # 9:30am ET = 14:30 UTC, lunes a viernes
  workflow_dispatch:          # permite correr manualmente

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Run screener
        run: python scripts/run_screener.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screener.json
          git diff --staged --quiet || git commit -m "chore: screener update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
